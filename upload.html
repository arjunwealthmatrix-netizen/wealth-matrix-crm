<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Upload Documents — Wealth Matrix Finserv</title>
<style>
:root{
  --bg:#000000; --s1:#111111; --s2:#1A1A1A; --border:#2A2A2A;
  --accent:#C0392B; --accent2:rgba(192,57,43,.12);
  --text:#FFFFFF; --t2:#AAAAAA; --t3:#666666;
  --green:#2ecc71; --r:12px; --r2:8px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh}
.wrap{max-width:460px;margin:0 auto;padding:0 0 40px}
.hdr{padding:22px 18px 16px;text-align:center;border-bottom:1px solid var(--border)}
.hdr .logo{font-size:34px;margin-bottom:6px}
.hdr h1{font-size:16px;font-weight:800;margin:0 0 4px}
.hdr p{font-size:11px;color:var(--t3);margin:0}
.state{padding:60px 24px;text-align:center}
.state .ico{font-size:40px;margin-bottom:14px}
.state h2{font-size:15px;font-weight:800;margin:0 0 8px}
.state p{font-size:12px;color:var(--t2);line-height:1.6;margin:0}
.greet{padding:18px;text-align:center}
.greet .name{font-size:17px;font-weight:800}
.greet .sub{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.5}
.slots{padding:6px 14px}
.slot{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.slot .l{flex:1;min-width:0}
.slot .l .t{font-size:14px;font-weight:700}
.slot .l .s{font-size:11px;color:var(--t3);margin-top:3px}
.slot .btn{font-size:12px;font-weight:700;color:#fff;background:var(--accent);padding:9px 14px;border-radius:var(--r2);cursor:pointer;flex-shrink:0;text-align:center}
.slot.done{border-color:var(--green)}
.slot.done .s{color:var(--green)}
.slot.err .s{color:#e74c3c}
.slot .btn.done{background:var(--s2);color:var(--green);border:1px solid var(--green)}
.footer-note{padding:18px 24px 4px;text-align:center;font-size:10px;color:var(--t3);line-height:1.6}
input[type=file]{display:none}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--t3);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">🔒</div>
    <h1>Wealth Matrix Finserv</h1>
    <p>Secure document upload</p>
  </div>
  <div id="app">
    <div class="state"><div class="spin" style="width:22px;height:22px"></div></div>
  </div>
</div>

<script>
// ── CONFIGURATION ── update this if you ever redeploy Apps Script with a new URL
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxi1b4DHWFsXuOCO5XTpsCPmhEawBDpC66eVZW7K1Z6aZ7zwLZ7HYhNd--saAv6CdG5/exec';

var DOC_TYPES = ['PAN','Aadhaar','Passport','Resident ID','CAS','Others'];
var client = null; // {name, mobile, pan}

function qs(name){
  var p = new URLSearchParams(window.location.search);
  return p.get(name) || '';
}

function fileToBase64(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){ resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Same POST pattern as the main app — text/plain avoids CORS preflight
async function apiPost(data){
  try{
    var r = await fetch(SCRIPT_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(data) });
    var t = await r.text();
    try{ return JSON.parse(t); } catch(e){ return r.ok ? {success:true} : {error:'HTTP '+r.status}; }
  }catch(e){ return {error:e.message}; }
}

function renderError(title, msg){
  document.getElementById('app').innerHTML =
    '<div class="state"><div class="ico">⚠️</div><h2>'+title+'</h2><p>'+msg+'</p></div>';
}

function renderSlots(){
  var app = document.getElementById('app');
  var html = '<div class="greet"><div class="name">Hi '+esc(client.name||'there')+'</div>'
    + '<div class="sub">Please upload the documents below. Tap any item to choose a photo or PDF from your phone.</div></div>'
    + '<div class="slots" id="slotList">'
    + DOC_TYPES.map(function(dt){
        var safeId = dt.replace(/\s+/g,'_');
        return '<div class="slot" id="row-'+safeId+'">'
          + '<div class="l"><div class="t">'+dt+'</div><div class="s" id="status-'+safeId+'">Not uploaded</div></div>'
          + '<label class="btn" id="btn-'+safeId+'">Upload'
          + '<input type="file" accept="image/*,.pdf" data-doctype="'+dt+'" onchange="handleUpload(this)">'
          + '</label></div>';
      }).join('')
    + '</div>'
    + '<div class="footer-note">🔒 Documents are uploaded directly and securely to your advisor\'s private folder. No account or login needed.</div>';
  app.innerHTML = html;
}

function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

async function handleUpload(inputEl){
  var docType = inputEl.dataset.doctype;
  var file = inputEl.files[0];
  if(!file) return;
  var safeId = docType.replace(/\s+/g,'_');
  var statusEl = document.getElementById('status-'+safeId);
  var rowEl = document.getElementById('row-'+safeId);
  var btnEl = document.getElementById('btn-'+safeId);

  if(file.size > 10*1024*1024){
    if(statusEl){ statusEl.textContent = 'File too large — please keep it under 10MB'; }
    if(rowEl) rowEl.className = 'slot err';
    inputEl.value=''; return;
  }

  if(statusEl){ statusEl.innerHTML = '<span class="spin"></span>Uploading…'; }
  if(rowEl) rowEl.className = 'slot';

  try{
    var base64 = await fileToBase64(file);
    var ext = file.name.indexOf('.')>=0 ? file.name.split('.').pop() : '';
    var res = await apiPost({
      action:'uploadClientDocument',
      clientName: client.name, pan: client.pan||'', mobile: client.mobile,
      docType: docType, fileData: base64, mimeType: file.type, fileExt: ext
    });
    if(res && res.success){
      if(statusEl) statusEl.textContent = '✅ Uploaded';
      if(rowEl) rowEl.className = 'slot done';
      if(btnEl){ btnEl.textContent = 'Replace'; btnEl.className='btn done'; btnEl.appendChild(inputEl); }
    } else {
      if(statusEl) statusEl.textContent = 'Upload failed — please try again';
      if(rowEl) rowEl.className = 'slot err';
    }
  }catch(e){
    if(statusEl) statusEl.textContent = 'Upload failed — please try again';
    if(rowEl) rowEl.className = 'slot err';
  }
  inputEl.value = '';
}

async function init(){
  var token = qs('id');
  if(!token){
    renderError('Invalid link', 'This upload link is missing information. Please ask your advisor to resend it.');
    return;
  }
  try{
    var r = await fetch(SCRIPT_URL + '?action=resolveUploadToken&token=' + encodeURIComponent(token) + '&t=' + Date.now());
    var j = await r.json();
    if(j && j.found){
      client = { name:j.name, mobile:j.mobile, pan:j.pan };
      renderSlots();
    } else {
      renderError('Link not found', 'This link is invalid or has expired. Please contact your advisor for a new one.');
    }
  }catch(e){
    renderError('Connection problem', 'Could not reach the server. Please check your internet connection and reopen this link.');
  }
}

init();
</script>
</body>
</html>
